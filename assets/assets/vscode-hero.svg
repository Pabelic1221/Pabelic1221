    <text x="234" y="1140" font-size="13"><tspan fill="#98c379">linkedin</tspan><tspan fill="#5c6370">/pabelic-jushua</tspan></text>
    <text x="234" y="1164" font-size="13"><tspan fill="#98c379">x</tspan><tspan fill="#5c6370">/@PabelicJushua</tspan></text>

