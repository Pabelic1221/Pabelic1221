      <text x="254" y="192"><tspan fill="#e06c75">philosophy</tspan><tspan fill="#abb2bf">: </tspan><tspan fill="#98c379">"Just because something WORKS"</tspan></text>
      <text x="254" y="212"><tspan fill="#98c379">+ "doesn't mean it can't be IMPROVED."</tspan><tspan fill="#abb2bf">,</tspan></text>
      <text x="254" y="232"><tspan fill="#e06c75">status</tspan><tspan fill="#abb2bf">: () =&gt; {</tspan></text>
      <text x="270" y="252"><tspan fill="#c678dd">return</tspan><tspan fill="#98c379"> "staring at code from 3 months ago"</tspan></text>
      <text x="254" y="272" fill="#abb2bf">},</text>
      <text x="234" y="292" fill="#abb2bf">};</text>
